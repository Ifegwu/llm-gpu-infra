name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      MI300X_PUBLIC_IP: ${{ secrets.MI300X_PUBLIC_IP }}
      MI300X_SSH_USER: ${{ secrets.MI300X_SSH_USER }}
      MI300X_HF_TOKEN: ${{ secrets.MI300X_HF_TOKEN }}
      MI300X_VLLM_IMAGE: ${{ secrets.MI300X_VLLM_IMAGE }}
      MI300X_TP_SIZE: ${{ secrets.MI300X_TP_SIZE }}
      HUGGING_FACE_HUB_TOKEN: ${{ secrets.MI300X_HF_TOKEN }}
      VLLM_IMAGE: ${{ secrets.MI300X_VLLM_IMAGE }}
      TP_SIZE: ${{ secrets.MI300X_TP_SIZE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint yamllint
          ansible-galaxy collection install ansible.posix

      - name: Validate shell scripts (bash -n)
        run: |
          bash -n script/install-host-prereqs.sh
          bash -n script/run-vllm-container.sh
          bash -n script/start-qwen36-27b.sh
          bash -n script/validate-endpoint.sh
          bash -n script/benchmark-qwen36-27b.sh

      - name: Lint shell scripts (shellcheck)
        run: |
          shellcheck script/*.sh

      - name: Lint YAML
        run: |
          yamllint ansible .github/workflows

      - name: Validate Ansible syntax
        run: |
          ansible-playbook -i ansible/hosts.ini ansible/deploy-mi300x.yml --syntax-check

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment: production
    env:
      MI300X_PUBLIC_IP: ${{ secrets.MI300X_PUBLIC_IP }}
      MI300X_SSH_USER: ${{ secrets.MI300X_SSH_USER }}
      MI300X_SSH_PRIVATE_KEY: ${{ secrets.MI300X_SSH_PRIVATE_KEY }}
      MI300X_SSH_PASSPHRASE: ${{ secrets.MI300X_SSH_PASSPHRASE }}
      MI300X_HF_TOKEN: ${{ secrets.MI300X_HF_TOKEN }}
      MI300X_VLLM_IMAGE: ${{ secrets.MI300X_VLLM_IMAGE }}
      MI300X_TP_SIZE: ${{ secrets.MI300X_TP_SIZE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required deployment secrets
        run: |
          test -n "${MI300X_PUBLIC_IP}" || (echo "Missing secret: MI300X_PUBLIC_IP" && exit 1)
          test -n "${MI300X_SSH_USER}" || (echo "Missing secret: MI300X_SSH_USER" && exit 1)
          test -n "${MI300X_SSH_PRIVATE_KEY}" || (echo "Missing secret: MI300X_SSH_PRIVATE_KEY" && exit 1)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deploy tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client netcat-openbsd
          python -m pip install --upgrade pip
          pip install ansible-core
          ansible-galaxy collection install ansible.posix

      - name: Configure SSH key for deploy
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${MI300X_SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${MI300X_PUBLIC_IP}" >> ~/.ssh/known_hosts

      - name: Validate SSH private key format
        run: |
          if ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null 2>&1; then
            echo "SSH key is unencrypted and valid."
          elif [[ -n "${MI300X_SSH_PASSPHRASE}" ]] && ssh-keygen -y -f ~/.ssh/id_ed25519 -P "${MI300X_SSH_PASSPHRASE}" >/dev/null 2>&1; then
            echo "SSH key is encrypted and passphrase is valid."
          else
            echo "Invalid MI300X_SSH_PRIVATE_KEY, or passphrase mismatch. Update MI300X_SSH_PRIVATE_KEY and optionally MI300X_SSH_PASSPHRASE."
            exit 1
          fi

      - name: Decrypt key for non-interactive use
        run: |
          cp ~/.ssh/id_ed25519 ~/.ssh/id_ed25519.original
          if [[ -n "${MI300X_SSH_PASSPHRASE}" ]]; then
            ssh-keygen -p -P "${MI300X_SSH_PASSPHRASE}" -N "" -f ~/.ssh/id_ed25519 >/dev/null 2>&1 || true
          fi
          chmod 600 ~/.ssh/id_ed25519

      - name: Preflight SSH connectivity diagnostics
        run: |
          echo "Testing TCP connectivity to ${MI300X_PUBLIC_IP}:22"
          nc -zv -w 10 "${MI300X_PUBLIC_IP}" 22 || (echo "Cannot reach SSH port 22 from GitHub runner. Check cloud firewall/host firewall/network ACL." && exit 1)
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "${MI300X_SSH_USER}@${MI300X_PUBLIC_IP}" "echo SSH connectivity OK"

      - name: Deploy with Ansible
        run: |
          export ANSIBLE_PRIVATE_KEY_FILE=~/.ssh/id_ed25519
          export ANSIBLE_HOST_KEY_CHECKING=False
          ansible-playbook -i ansible/hosts.ini ansible/deploy-mi300x.yml \
            -e mi300x_hf_token="${MI300X_HF_TOKEN}" \
            -e mi300x_vllm_image="${MI300X_VLLM_IMAGE}" \
            -e mi300x_tp_size="${MI300X_TP_SIZE}"

      - name: Capture and print baseline report
        run: |
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "${MI300X_SSH_USER}@${MI300X_PUBLIC_IP}" "\
            cd /opt/llm-gpu-infra && \
            chmod +x script/capture-baseline-report.sh && \
            script/capture-baseline-report.sh script http://127.0.0.1:8000 && \
            latest=\$(ls -1t script/baseline-results-*.md | head -n 1) && \
            echo \"Baseline report file: \$latest\" && \
            echo \"----- BEGIN BASELINE REPORT -----\" && \
            cat \"\$latest\" && \
            echo \"----- END BASELINE REPORT -----\""
